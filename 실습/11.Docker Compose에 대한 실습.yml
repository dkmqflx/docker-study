# Docker Compose 파일
# 이 파일은 하나 이상의 컨테이너로 구성된 멀티 컨테이너 애플리케이션을 정의합니다.
# 형식: docker-compose.yml 또는 docker-compose.yaml

# services: 실행할 모든 서비스(컨테이너)를 정의하는 섹션
services:
  # app: 서비스의 이름 (이 이름으로 다른 서비스에서 네트워크 통신 가능)
  app:
    # build: 이미지를 Dockerfile로부터 빌드하는 설정
    # image를 사용하면 Docker Hub의 기존 이미지를 사용하고,
    # build를 사용하면 로컬 Dockerfile로부터 이미지를 빌드합니다.
    build:
      # context: Dockerfile이 위치한 디렉토리 경로
      # 여기서는 my-first-docker 폴더 안의 Dockerfile을 사용해서 이미지를 빌드합니다.
      context: my-first-docker
      # 빌드 완료 후 이 이미지를 app 서비스로 실행합니다.

    # ports: 호스트와 컨테이너 간의 포트 매핑
    # 형식: "[호스트_포트]:[컨테이너_포트]"
    ports:
      # 호스트 머신의 5001번 포트로 요청이 오면
      # 컨테이너 내부의 5000번 포트로 전달됩니다.
      # 예: http://localhost:5001 → 컨테이너 내부 5000번 포트
      - "5001:5000"

# Docker Compose 사용 명령어:
# docker compose up        : 모든 서비스 시작 (foreground)
# docker compose up -d     : 모든 서비스 백그라운드 시작
# docker compose down      : 모든 서비스 중지 및 컨테이너 삭제
# docker compose logs app  : app 서비스의 로그 확인
# docker compose ps        : 실행 중인 서비스 목록 확인
